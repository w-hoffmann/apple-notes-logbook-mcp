# Git hooks managed by Lefthook. Install once with `lefthook install`
# (or `make setup`). See design D9.

pre-commit:
  parallel: true
  commands:
    ruff-format:
      glob: "*.py"
      run: uv run ruff format --check {staged_files}
      stage_fixed: true
    ruff-lint:
      glob: "*.py"
      run: uv run ruff check {staged_files}

pre-push:
  commands:
    pyright:
      run: uv run pyright
    pytest:
      run: uv run pytest
